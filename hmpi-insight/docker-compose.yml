version: '3.8'

services:
  # MongoDB Database for HMPI
  mongodb:
    image: mongo:7.0
    container_name: hmpi-mongodb
    environment:
      MONGO_INITDB_DATABASE: hmpi-insight
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - hmpi-network
    restart: unless-stopped

  # HMPI Backend (Node.js/Express)
  hmpi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hmpi-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/hmpi-insight
      - CLIENT_URL=http://localhost:3000
      - PORT=5000
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - hmpi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HMPI Frontend (React)
  hmpi-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hmpi-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    depends_on:
      - hmpi-backend
    networks:
      - hmpi-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  hmpi-network:
    driver: bridge
